# Standalone Postgres compose file for Topology A2 / B / C.
#
# Used when the `db` container runs on its OWN VM, separate from the app
# tier. The App VM runs the standard docker-compose.yml with
# DB_EMBEDDED=false and POSTGRES_HOST pointing at this VM's private IP.
#
# Bring up with:
#   docker compose --env-file .env.db -f docker-compose.db.yml up -d
#
# Backup / restore commands: see onprem/docs/backup-runbook.md (A2 section)
version: "3.9"

services:
  db:
    image: ghcr.io/taskmaster/onprem-db:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      # Exposed on the private network only — firewall this port to
      # allow inbound from the App VM(s) ONLY. Never expose to the
      # public internet.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./seed:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 12
    shm_size: 1gb

volumes:
  db-data:
